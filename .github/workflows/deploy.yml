name: Deploy mdBook site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p $HOME/.cargo/bin
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C $HOME/.cargo/bin
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build all books
        run: |
          mkdir -p _site
          # Build each book in books/, skipping anything that starts with _
          for book_dir in books/*/; do
            book_name=$(basename "$book_dir")
            if [[ "$book_name" == _* ]]; then
              echo "Skipping template: $book_name"
              continue
            fi
            echo "Building $book_name..."
            (cd "$book_dir" && mdbook build)
            mkdir -p "_site/$book_name"
            cp -r "$book_dir/book/." "_site/$book_name/"
          done
          # Copy the landing page to the site root
          cp index.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
